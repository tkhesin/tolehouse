<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tolehouse Karaoke Band</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-dim: #8B6E2A;
    --deep: #0D0D0D;
    --surface: #161616;
    --surface2: #1E1E1E;
    --surface3: #272727;
    --text: #F0EAD6;
    --text-dim: #8A8070;
    --text-mid: #B8A98A;
    --red: #C44B3A;
    --green: #3A8A5C;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(201,168,76,0.12) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px);
  }

  header {
    text-align: center;
    padding: 48px 24px 32px;
    position: relative;
  }

  .mic-icon {
    font-size: 36px;
    display: block;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 12px rgba(201,168,76,0.6));
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(28px, 6vw, 42px);
    letter-spacing: -0.5px;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dim));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin-top: 8px;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto 0;
  }

  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 16px 80px;
  }

  /* Name input section */
  .section {
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    display: block;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius);
    padding: 14px 18px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 400;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]:focus {
    border-color: rgba(201,168,76,0.6);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
  }

  input[type="text"]::placeholder {
    color: var(--text-dim);
  }

  /* Genre filters */
  .genre-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }

  .genre-scroll::-webkit-scrollbar { display: none; }

  .genre-pill {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 100px;
    border: 1px solid rgba(201,168,76,0.25);
    background: transparent;
    color: var(--text-mid);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .genre-pill:hover {
    border-color: rgba(201,168,76,0.5);
    color: var(--gold-light);
  }

  .genre-pill.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--deep);
    font-weight: 500;
  }

  /* Search */
  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
  }

  .search-wrap input {
    padding-left: 42px;
  }

  /* Song count */
  .song-count {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
    text-align: right;
  }

  /* Song list */
  .song-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 340px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--surface3) transparent;
  }

  .song-list::-webkit-scrollbar { width: 4px; }
  .song-list::-webkit-scrollbar-track { background: transparent; }
  .song-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

  .song-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid transparent;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    gap: 12px;
  }

  .song-item:hover {
    background: var(--surface3);
    border-color: rgba(201,168,76,0.2);
  }

  .song-item.selected {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold);
  }

  .song-info { flex: 1; min-width: 0; }

  .song-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .song-artist {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .song-check {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid rgba(201,168,76,0.3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .song-item.selected .song-check {
    background: var(--gold);
    border-color: var(--gold);
  }

  .song-item.selected .song-check::after {
    content: '';
    width: 5px;
    height: 9px;
    border: 2px solid var(--deep);
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
    display: block;
  }

  .no-results {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* Selected song banner */
  .selected-banner {
    display: none;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 14px;
  }

  .selected-banner.visible { display: flex; align-items: center; gap: 10px; }

  .selected-banner .label { color: var(--gold); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 2px; }
  .selected-banner .song-name { color: var(--text); font-weight: 500; }

  /* Submit button */
  .submit-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    border: none;
    border-radius: var(--radius);
    color: var(--deep);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .submit-btn:hover { opacity: 0.92; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  /* Toast / notifications */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    padding: 18px 26px;
    border-radius: var(--radius);
    font-size: 18px;
    font-weight: 400;
    max-width: 400px;
    width: calc(100% - 32px);
    text-align: center;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    opacity: 0;
    z-index: 999;
    line-height: 1.55;
  }

  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.success { background: #1A3328; border: 1px solid #3A8A5C; color: #7DD4A8; }
  .toast.error { background: #2E1A18; border: 1px solid #C44B3A; color: #F08070; }
  .toast.warning { background: #2C2212; border: 1px solid #C9A84C; color: #E8C96A; }

  .loading-spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(13,13,13,0.3);
    border-top-color: var(--deep);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-state .big { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }
</style>
</head>
<body>

<header>
  <span class="mic-icon">🎤</span>
  <h1>Tolehouse Karaoke<br>Band</h1>
  <p class="subtitle">Request a Song</p>
  <div class="divider"></div>
</header>

<main>

  <!-- Name -->
  <div class="section">
    <span class="section-label">Your Name</span>
    <input type="text" id="name-input" placeholder="Enter your name" autocomplete="off" autocorrect="off">
  </div>

  <!-- Genre Filter -->
  <div class="section">
    <span class="section-label">Filter by Genre</span>
    <div class="genre-scroll" id="genre-filters">
      <button class="genre-pill active" data-genre="all">All</button>
      <button class="genre-pill" data-genre="Classic Rock">Classic Rock</button>
      <button class="genre-pill" data-genre="Rock">Rock</button>
      <button class="genre-pill" data-genre="80s">80s</button>
      <button class="genre-pill" data-genre="Folk">Folk</button>
      <button class="genre-pill" data-genre="Country">Country</button>
      <button class="genre-pill" data-genre="Contemporary">Contemporary</button>
      <button class="genre-pill" data-genre="Soul / R&B">Soul / R&B</button>
      <button class="genre-pill" data-genre="Latin">Latin</button>
      <button class="genre-pill" data-genre="Oldies">Oldies</button>
      <button class="genre-pill" data-genre="Duet">Duet</button>
    </div>
  </div>

  <!-- Search -->
  <div class="section">
    <span class="section-label">Search Songs</span>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search by song or artist…" autocomplete="off" autocorrect="off">
    </div>
  </div>

  <!-- Song list -->
  <div class="section">
    <div class="song-count" id="song-count"></div>
    <div class="song-list" id="song-list">
      <div class="empty-state">
        <div class="big">🎵</div>
        <p>Loading songs…</p>
      </div>
    </div>
  </div>

  <!-- Selected banner -->
  <div class="selected-banner" id="selected-banner">
    <div style="flex:1">
      <span class="label">Selected</span>
      <span class="song-name" id="selected-song-name"></span>
    </div>
    <button onclick="clearSelection()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:18px;padding:0;">✕</button>
  </div>

  <!-- Submit -->
  <button class="submit-btn" id="submit-btn" onclick="submitRequest()" disabled>
    Add to Queue
  </button>

</main>

<div class="toast" id="toast"></div>

<script>
  // ============================================================
  // CONFIGURATION — replace with your deployed Apps Script URL
  // ============================================================
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwx09l1x3V8PLP_NmaVnDBpgDPi9RTPHzYMfC0wAGNG8q2op0bxlIn4qH7ixRB4yWrxXQ/exec';
  // ============================================================

  let allSongs = [];       // { song, genres[] }
  let filtered = [];
  let selectedSong = null;
  let activeGenre = 'all';

  // ---- Load songs ----
  async function loadSongs() {
    try {
      const res = await fetch(`${SCRIPT_URL}?action=songs`);
      const data = await res.json();
      allSongs = data.songs || [];
      applyFilters();
    } catch (e) {
      document.getElementById('song-list').innerHTML = `
        <div class="empty-state"><div class="big">⚠️</div><p>Could not load songs. Please refresh.</p></div>`;
    }
  }

  // ---- Filtering ----
  function applyFilters() {
    const query = document.getElementById('search-input').value.toLowerCase().trim();
    filtered = allSongs.filter(s => {
      const matchGenre = activeGenre === 'all' || s.genres.includes(activeGenre);
      const matchSearch = !query ||
        s.song.toLowerCase().includes(query);
      return matchGenre && matchSearch;
    });
    renderSongs();
  }

  function renderSongs() {
    const list = document.getElementById('song-list');
    const count = document.getElementById('song-count');

    if (!allSongs.length) {
      list.innerHTML = `<div class="empty-state"><div class="big">🎵</div><p>Loading songs…</p></div>`;
      count.textContent = '';
      return;
    }

    count.textContent = `${filtered.length} song${filtered.length !== 1 ? 's' : ''}`;

    if (!filtered.length) {
      list.innerHTML = `<div class="no-results">No songs match your search</div>`;
      return;
    }

    list.innerHTML = filtered.map((s, i) => {
      const key = s.song;
      const isSel = selectedSong && selectedSong.key === key;
      return `<div class="song-item${isSel ? ' selected' : ''}" onclick="selectSong(${i})" data-key="${key}">
        <div class="song-info">
          <div class="song-title">${escHtml(s.song)}</div>
        </div>
        <div class="song-check"></div>
      </div>`;
    }).join('');
  }

  function selectSong(filteredIdx) {
    const s = filtered[filteredIdx];
    const key = s.song;
    if (selectedSong && selectedSong.key === key) {
      clearSelection();
      return;
    }
    selectedSong = { ...s, key };
    document.getElementById('selected-song-name').textContent = s.song;
    document.getElementById('selected-banner').classList.add('visible');
    updateSubmitState();
    renderSongs();
    // Scroll selected into view
    requestAnimationFrame(() => {
      const el = document.querySelector(`.song-item[data-key="${CSS.escape(key)}"]`);
      if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    });
  }

  function clearSelection() {
    selectedSong = null;
    document.getElementById('selected-banner').classList.remove('visible');
    updateSubmitState();
    renderSongs();
  }

  function updateSubmitState() {
    const name = document.getElementById('name-input').value.trim();
    document.getElementById('submit-btn').disabled = !name || !selectedSong;
  }

  // ---- Genre pills ----
  document.getElementById('genre-filters').addEventListener('click', e => {
    const pill = e.target.closest('.genre-pill');
    if (!pill) return;
    document.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeGenre = pill.dataset.genre;
    applyFilters();
  });

  document.getElementById('search-input').addEventListener('input', applyFilters);
  document.getElementById('name-input').addEventListener('input', updateSubmitState);

  // ---- Submit ----
  async function submitRequest() {
    const name = document.getElementById('name-input').value.trim();
    if (!name || !selectedSong) return;

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spinner"></span>Adding to queue…';

    try {
      const params = new URLSearchParams({
        action: 'submit',
        name,
        song: selectedSong.song
      });
      const res = await fetch(SCRIPT_URL + '?' + params.toString());
      const data = await res.json();

      if (data.success) {
        const waitMin = (data.songsAhead || 0) * 5;
        const waitMsg = waitMin > 0
          ? ` You're up in about ${waitMin} minutes!`
          : ` You're up next!`;
        showToast(`You're in the queue!${waitMsg}`, 'success', 6000);
        clearSelection();
        document.getElementById('search-input').value = '';
        applyFilters();
      } else if (data.limitReached) {
        showToast(`You already have ${data.pendingCount} song${data.pendingCount > 1 ? 's' : ''} pending in the queue. Once one of your songs is sung, you can request again!`, 'warning', 6000);
      } else {
        showToast(data.message || 'Something went wrong. Please try again.', 'error');
      }
    } catch (e) {
      showToast('Connection error. Please try again.', 'error');
    }

    btn.innerHTML = 'Add to Queue';
    updateSubmitState();
  }

  // ---- Toast ----
  function showToast(msg, type = 'success', duration = 4000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => { t.classList.remove('show'); }, duration);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ---- Init ----
  loadSongs();
</script>
</body>
</html>
